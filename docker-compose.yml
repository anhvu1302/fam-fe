services:
  fam-fe:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CRYPTO_KEY=${NEXT_PUBLIC_CRYPTO_KEY}
        - NEXT_PUBLIC_ENABLE_ENCRYPTION=${NEXT_PUBLIC_ENABLE_ENCRYPTION:-true}
    container_name: fam-fe
    restart: unless-stopped
    ports:
      - "${PORT:-8001}:8001"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-8001}
      - BACKEND_API_URL=${BACKEND_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_CRYPTO_KEY=${NEXT_PUBLIC_CRYPTO_KEY}
      - NEXT_PUBLIC_ENABLE_ENCRYPTION=${NEXT_PUBLIC_ENABLE_ENCRYPTION:-false}
    env_file:
      - .env
    networks:
      - fam-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fam-fe.rule=Host(`vananhvu.id.vn`)"
      - "traefik.http.services.fam-fe.loadbalancer.server.port=8001"

networks:
  fam-network:
    driver: bridge
